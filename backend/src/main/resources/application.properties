spring.application.name=backend

# Server port (Render uses PORT env variable)
server.port=${PORT:8080}

# MongoDB (use MONGODB_URI env variable in production)
spring.data.mongodb.uri=${MONGODB_URI:mongodb+srv://vennelapriya743_db_user:vennelapriya743@universecluster.fv2pmke.mongodb.net/universe?retryWrites=true&w=majority}

# Allow larger request bodies for image uploads (Base64 encoded)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
server.tomcat.max-http-form-post-size=10485760
server.tomcat.max-swallow-size=10485760
server.max-http-request-header-size=65536

# JWT (use env JWT_SECRET in production; min 256 bits for HS256)
jwt.secret=${JWT_SECRET:universe-dev-secret-change-in-production-min-32-chars}
jwt.expiration-ms=86400000

# University verification: allowed email domains (comma-separated). Example: edu, ac.in, ac.uk
universe.allowed-email-domains=${ALLOWED_EMAIL_DOMAINS:edu,ac.in,ac.uk}

# Admin API key for metrics endpoint (optional; set ADMIN_API_KEY in production)
universe.admin-api-key=${ADMIN_API_KEY:}
